<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Sprint Prototypes</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;max-width:600px;margin:80px auto;padding:20px;color:#333}
h1{font-size:2em;margin-bottom:0.3em}
p{color:#666;font-size:1.1em}
.cards{display:flex;flex-direction:column;gap:20px;margin-top:40px}
a.card{display:block;padding:30px;border-radius:16px;text-decoration:none;color:#fff;font-size:1.2em;font-weight:600;transition:transform 0.2s}
a.card:hover{transform:translateY(-3px)}
.warm{background:linear-gradient(135deg,#D4A574,#E8C49A)}
.chaos{background:linear-gradient(135deg,#1A1A2E,#0F3460);border:1px solid #00D4FF}
.sub{font-size:0.8em;font-weight:400;opacity:0.8;display:block;margin-top:8px}
</style></head>
<body>
<h1>🦞 Design Sprint</h1>
<p>AI Personal Assistant — Onboarding Prototypes</p>
<p style="font-size:0.9em;color:#999">March 12, 2026 • 5 agents • 30-minute sprint</p>
<div class="cards">
<a href="warm/" class="card warm">
  ☀️ Version A: The Warm Human
  <span class="sub">Cream/amber • Soft animations • "Morning, Noor" • Headspace vibes</span>
</a>
<a href="chaos/" class="card chaos">
  ⚡ Version B: The Chaos Killer
  <span class="sub">Dark mode • Electric blue • "FIX THIS CHAOS" • 347→8→0</span>
</a>
</div>
</body></html>
